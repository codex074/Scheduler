services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharmacy-shift-scheduler
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/app/data/dev.db
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    volumes:
      - scheduler_data:/app/data
    restart: unless-stopped

volumes:
  scheduler_data:
